"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
# A minimal left prompt
# format = """$directory$character"""
palette = "catppuccin_mocha"
# move the rest of the prompt to the right
# format = "[ $path ]($style)"
# right_format = """$all"""
format = """$all"""
command_timeout = 1000


[character]
# vicmd_symbol = "[N] >>>"
# success_symbol = '[➜](bold green)'

[directory]
# style = "fg:#e3e5e5 bg:#769ff0"
truncation_length = 3
truncation_symbol = "…/"
truncate_to_repo = false
substitutions = [
  { from = "^.*/src/[^/]+(?:/[^/]+)*/([^/]+)/\\.worktrees/[^/]+(/.*)?$", to = "…/$1$2", regex = true },
  { from = "^.*/src/[^/]+/[^/]+/([^/]+)(/.*)?$", to = "…/$1$2", regex = true },
  { from = "Desktop", to = " " },
  { from = "Documents", to = "󰲂 " },
  { from = "Downloads", to = "󰉍 " },
  { from = "Music", to = "󱍙 " },
  { from = "Pictures", to = "󰉏 " },
  { from = "Projects", to = "󱧼 " },
  # { from = "~/.config", to = "󱧼 " },
  { from = "~/.config", to = "" },

  { from = "~/github/mahlstrom", to = "DEV2" },
]

[aws]
format = '\[[$symbol($profile)(\($region\))(\[$duration\])]($style)\]'

[bun]
format = '\[[$symbol($version)]($style)\]'

[c]
format = '\[[$symbol($version(-$name))]($style)\]'

